# =====================================
# ENTERPRISE TEST CONFIGURATION - H2 DATABASE
# =====================================

# Enable bean definition overriding for tests
spring.main.allow-bean-definition-overriding=true

# Disable external services for testing
firebase.enabled=false

# H2 Database Configuration (PostgreSQL compatibility mode)
spring.datasource.url=jdbc:h2:mem:testdb;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

# JPA/Hibernate Test Configuration
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect

# PostGIS Configuration (Simulated for H2)
spring.jpa.properties.hibernate.spatial.dialect=org.hibernate.spatial.dialect.h2geodb.H2GeoDBDialect
spring.jpa.properties.hibernate.spatial.jdbc_spatial_type=org.locationtech.jts.geom.Geometry

# Flyway disabled for tests (use Hibernate DDL)
spring.flyway.enabled=false

# Redis Configuration (Disabled for tests)
spring.data.redis.host=localhost
spring.data.redis.port=6379
spring.data.redis.timeout=2000ms
spring.data.redis.jedis.pool.max-active=8
spring.data.redis.jedis.pool.max-idle=8
spring.data.redis.jedis.pool.min-idle=0

# Cache Configuration (Disabled for tests)
spring.cache.type=none
cache.advanced.https-cache-enabled=false

# Kafka Configuration (minimal for tests)
spring.kafka.bootstrap-servers=localhost:9092
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.producer.bootstrap-servers=localhost:9092

# Mail Configuration (disabled for tests)
spring.mail.host=localhost
spring.mail.port=587
spring.mail.username=test
spring.mail.password=test
spring.mail.properties.mail.smtp.auth=false
spring.mail.properties.mail.smtp.starttls.enable=false

# SSL Configuration (disabled for tests)
server.ssl.enabled=false
server.port=0

# Enterprise Test Logging Configuration
logging.level.com.example.smartAttendence=DEBUG
logging.level.org.springframework.security=DEBUG
logging.level.org.springframework.web=INFO
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE
logging.level.org.testcontainers=INFO

# Performance monitoring disabled for tests
performance.monitoring.enabled=false

# Security monitoring disabled for tests
security.monitoring.enabled=false
security.audit.logger.enabled=false
security.threat.detection.enabled=false

# Rate limiting configuration for tests
rate.limit.global.requests-per-minute=10000
rate.limit.auth.requests-per-minute=5000
rate.limit.admin.requests-per-minute=5000
rate.limit.heartbeat.requests-per-minute=10000

# AI services disabled for tests
spring.ai.google.genai.api-key=test-key
spring.ai.google.genai.chat.options.model=gemini-1.5-flash

# Cache Configuration (Redis for tests)
spring.cache.type=redis
spring.cache.redis.time-to-live=300000
spring.cache.redis.cache-null-values=false
cache.advanced.https-cache-enabled=false

# Actuator endpoints for testing
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=always

# JWT Enterprise Test Configuration
jwt.secret-key=test-secret-key-for-enterprise-testing-suite-512-bit-encryption-very-long-secret-key-for-testing-purposes-only
jwt.expiration=900000
jwt.refresh-token.expiration=604800000

# Test-specific thread pool configuration
server.tomcat.threads.max=200
server.tomcat.threads.min-spare=10
server.tomcat.max-connections=1000

# Resilience4j Test Configuration
resilience4j.circuitbreaker.configs.default.failure-rate-threshold=50
resilience4j.circuitbreaker.configs.default.wait-duration-in-open-state=5s
resilience4j.circuitbreaker.configs.default.sliding-window-size=10
resilience4j.circuitbreaker.configs.default.minimum-number-of-calls=5

# Monitoring disabled for tests
management.tracing.enabled=false
management.metrics.export.prometheus.enabled=false

# Security Headers Test Configuration
security.headers.content-security-policy=default-src 'self'
security.headers.x-frame-options=DENY
security.headers.x-content-type-options=nosniff
security.headers.x-xss-protection=1; mode=block
security.headers.strict-transport-security=max-age=31536000; includeSubDomains

# Input Validation Test Configuration
security.validation.enabled=true
security.validation.sql-injection-protection=true
security.validation.xss-protection=true
security.validation.path-traversal-protection=true

# Testcontainers Configuration
testcontainers.reuse.enable=true

# Application Test Configuration
spring.application.name=smartattendence-test
