# =====================================
# MASTER CONFIGURATION (CORE LOGIC)
# =====================================
spring.application.name=Smart-Attendance-Engine
spring.main.allow-circular-references=true

# Default Profile
spring.profiles.active=dev

# Logging
logging.file.name=diag.log
logging.level.com.example.smartAttendence=INFO
logging.level.org.springframework.security=INFO
logging.level.org.hibernate.SQL=INFO
logging.level.com.zaxxer.hikari=DEBUG
logging.level.org.flywaydb=DEBUG

# =====================================
# PERFORMANCE & MONITORING (GLOBAL)
# =====================================
management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.health.show-details=always
management.metrics.enabled=true
management.metrics.export.prometheus.enabled=true
management.metrics.tags.application=Smart-Attendance-Engine

# Tomcat Universal Settings
server.tomcat.max-http-form-post-size=104857600
server.forward-headers-strategy=native

# JWT Defaults
jwt.access-token.expiration-minutes=60
jwt.refresh-token.expiration-days=120
jwt.refresh-token.max-active-per-user=5

# JPA / Hibernate Universal
# Dialect auto-detected from datasource (PostgreSQL)
spring.jpa.open-in-view=false

# Flyway Universal
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.locations=classpath:db/migration

# Cache Logic (Now using Local Caffeine for 10K High Performance)
spring.cache.type=caffeine
spring.cache.cache-names=threat_analysis,rate_limiting,validation_cache

# Messaging Logic Defaults
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.ssl.trust=smtp.gmail.com

# Resilience4J (Universal Rules)
resilience4j.ratelimiter.instances.attendance-scan.limit-for-period=1000
resilience4j.ratelimiter.instances.attendance-scan.limit-refresh-period=10s
resilience4j.circuitbreaker.default.wait-duration-in-open-state=30s
resilience4j.circuitbreaker.default.failure-rate-threshold=50

# Global Security Logic
security.threat.detection.enabled=${SECURITY_THREAT_DETECTION_ENABLED:true}
security.jwt.blacklist.enabled=${SECURITY_JWT_BLACKLIST_ENABLED:true}

# Role-Based Security Configuration (Updated)
# IP Whitelist is NO LONGER used - security based on JWT role + device binding
security.ip-whitelist.enabled=false
security.ip-whitelist.required-for-admin=false

# Device Fingerprint - REQUIRED only for STUDENTS
security.device-fingerprint.required-for-roles=STUDENT
security.device-fingerprint.validate-binding=true

# Credential-Only Security for Trusted Roles
security.credential-only-for-roles=FACULTY,ADMIN,SUPER_ADMIN

# Rate Limiting (per IP, adjusted for each role)
security.rate-limit.student.requests-per-minute=30
security.rate-limit.faculty.requests-per-minute=50
security.rate-limit.admin.requests-per-minute=100
security.rate-limit.super-admin.requests-per-minute=150

# Behavioral Analysis (for STUDENT role only)
security.behavioral-analysis.enabled=true
security.behavioral-analysis.geofencing=true
security.behavioral-analysis.location-check=true

spring.jackson.deserialization.fail-on-unknown-properties=false