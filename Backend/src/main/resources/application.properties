# =====================================
# APPLICATION BASIC CONFIG - HTTPS OPTIMIZED
# =====================================
spring.application.name=Smart-Attendance-Engine
spring.main.allow-circular-references=true
spring.config.import=optional:file:.env
server.port=8443
logging.file.name=diag.log
logging.level.com.example.smartAttendence=DEBUG
logging.level.org.springframework.security=DEBUG

# Custom High-Performance Rate Limiting (Used by HighPerformanceRateLimitingFilter)
rate-limit.global.requests-per-minute=${RATE_LIMIT_GLOBAL_RPM}
rate-limit.auth.requests-per-minute=${RATE_LIMIT_AUTH_RPM}
rate-limit.admin.requests-per-minute=${RATE_LIMIT_ADMIN_RPM}
rate-limit.heartbeat.requests-per-minute=${RATE_LIMIT_HEARTBEAT_RPM}

# Custom Security Thresholds
rate-limit.burst-capacity=${RATE_LIMIT_BURST_CAPACITY}
rate-limit.suspicious-threshold=${RATE_LIMIT_SUSPICIOUS_THRESHOLD}
rate-limit.rapid-succession-threshold=${RATE_LIMIT_RAPID_SUCCESSION_THRESHOLD}

# Performance Optimizations
spring.jmx.enabled=true
server.tomcat.max-http-form-post-size=104857600
server.tomcat.max-swallow-size=104857600

# Force HTTPS Redirect
server.forward-headers-strategy=native
server.tomcat.remote-ip-header=x-forwarded-for
server.tomcat.protocol-header=x-forwarded-proto

# Enhanced Monitoring & Observability
management.endpoints.web.exposure.include=health,info,metrics,prometheus,env,configprops,threaddump,heapdump
management.endpoint.health.show-details=always
management.endpoint.health.show-components=always
management.metrics.enabled=true
management.endpoint.metrics.enabled=true
management.endpoint.prometheus.enabled=true
management.metrics.export.prometheus.enabled=true
management.metrics.export.simple.enabled=true
management.metrics.tags.application=Smart-Attendance-Engine
management.metrics.distribution.percentiles-histogram.http.server.requests=true
management.metrics.distribution.percentiles.http.server.requests=0.5,0.95,0.99
management.metrics.web.server.request.autotime.enabled=true

# Application info for monitoring
management.info.env.enabled=true
management.info.java.enabled=true
management.info.os.enabled=true

# Monitoring Cache Timeouts
management.endpoint.health.cache.time-to-live=30000
management.endpoint.info.cache.time-to-live=30000
management.endpoint.metrics.cache.time-to-live=30000

# =====================================
# FIREBASE CONFIGURATION
# =====================================
firebase.enabled=${FIREBASE_ENABLED}
firebase.service-account-path=${FIREBASE_SERVICE_ACCOUNT_PATH}

# =====================================
# SECURITY CONFIGURATION & HTTPS
# =====================================
server.ssl.enabled=true
server.ssl.key-store=classpath:smartattendence.p12
server.ssl.key-store-password=${SSL_KEYSTORE_PASSWORD}
server.ssl.key-store-type=PKCS12
server.ssl.key-alias=smartattendence
server.ssl.protocol=TLSv1.3
server.ssl.enabled-protocols=TLSv1.3,TLSv1.2

# Sessions & Cookies
server.servlet.session.timeout=1800
server.servlet.session.cookie.http-only=true
server.servlet.session.cookie.secure=true
server.servlet.session.cookie.same-site=strict
server.servlet.session.cookie.max-age=3600

# HTTPS Security Headers
security.headers.hsts.max-age=31536000
security.headers.hsts.include-subdomains=true
security.headers.hsts.preload=true
security.headers.frame-options=SAMEORIGIN
security.headers.content-type-options=nosniff
security.headers.xss-protection=1; mode=block
security.headers.referrer-policy=strict-origin-when-cross-origin

# JWT Token Configuration
jwt.access-token.expiration-minutes=${JWT_ACCESS_TOKEN_EXPIRATION_MINUTES}
jwt.refresh-token.expiration-days=${JWT_REFRESH_TOKEN_EXPIRATION_DAYS:120}
jwt.refresh-token.max-active-per-user=${JWT_REFRESH_TOKEN_MAX_ACTIVE_PER_USER}
jwt.issuer=${JWT_ISSUER}
jwt.public-key=${JWT_PUBLIC_KEY}
jwt.private-key=${JWT_PRIVATE_KEY}

# =====================================
# POSTGRESQL & HIKARICP POOLING
# =====================================
spring.datasource.url=jdbc:postgresql://${DB_HOST}:${DB_PORT}/${DB_NAME}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

# HikariCP Configuration (Safely scaled down to 50 for default Postgres limits)
spring.datasource.hikari.maximum-pool-size=50
spring.datasource.hikari.minimum-idle=10
spring.datasource.hikari.connection-timeout=10000
spring.datasource.hikari.validation-timeout=3000
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.leak-detection-threshold=30000
spring.datasource.hikari.pool-name=SmartAttendance-HikariPool
spring.datasource.hikari.register-mbeans=true
spring.datasource.hikari.auto-commit=true
spring.datasource.hikari.connection-test-query=SELECT 1
spring.datasource.hikari.health-check-properties=connectivityCheck=true,validationQuery=SELECT 1
spring.datasource.hikari.metrics-tracker=true

# ==========================================
# FLYWAY (Database Version Control)
# ==========================================
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.out-of-order=false
spring.flyway.validate-on-migrate=true
spring.flyway.locations=classpath:db/migration
spring.flyway.placeholders.postgis_extension=postgis

# ===============================
# REDIS CONFIGURATION
# ===============================
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.password=${REDIS_PASSWORD:}
spring.data.redis.timeout=3000
spring.data.redis.client-type=lettuce

# Lettuce Pool Tuning
spring.data.redis.lettuce.pool.max-active=500
spring.data.redis.lettuce.pool.max-idle=50
spring.data.redis.lettuce.pool.min-idle=10
spring.data.redis.lettuce.pool.max-wait=5000ms
spring.data.redis.lettuce.shutdown-timeout=100ms
spring.data.redis.lettuce.command-timeout=3000ms
spring.data.redis.lettuce.cluster.refresh.adaptive=true

# Spring Cache
spring.cache.type=redis
spring.cache.redis.time-to-live=3600000
spring.cache.redis.cache-null-values=false
spring.cache.redis.use-key-prefix=true
spring.cache.redis.key-prefix=smart_attendance_cache:

# Redis JSON Serialization
spring.data.redis.serialization.default-serializer=org.springframework.data.redis.serializer.GenericJackson2JsonRedisSerializer
spring.data.redis.serialization.key-serializer=org.springframework.data.redis.serializer.StringRedisSerializer

# =====================================
# WEB, TOMCAT & UPLOAD SETTINGS
# =====================================
# File Uploads (Unified)
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=104857600
spring.servlet.multipart.max-request-size=104857600
spring.servlet.multipart.file-size-threshold=0

# Tomcat Thread & Network Tuning
server.tomcat.threads.max=2000
server.tomcat.threads.min-spare=100
server.tomcat.max-connections=20000
server.tomcat.accept-count=1000
server.tomcat.connection-timeout=30000
server.tomcat.keep-alive-timeout=30000
server.tomcat.max-keep-alive-requests=5000
server.tomcat.protocol=org.apache.coyote.http11.Http11NioProtocol

# HTTP/2 & Compression
server.http2.enabled=true
server.compression.enabled=true
server.compression.mime-types=text/html,text/xml,text/plain,text/css,text/javascript,application/javascript,application/json
server.compression.min-response-size=1024

# Async Request Processing
spring.mvc.async.request-timeout=30000
spring.task.execution.pool.core-size=8
spring.task.execution.pool.max-size=50

# =====================================
# MESSAGING CONFIG (Gmail/Brevo & Twilio)
# =====================================
spring.mail.host=${EMAIL_HOST:smtp.gmail.com}
spring.mail.port=${EMAIL_PORT:587}
spring.mail.username=${EMAIL_USERNAME}
spring.mail.password=${EMAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.ssl.trust=${EMAIL_HOST:smtp.gmail.com}
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=15000

# Twilio SMS Credentials
twilio.account.sid=${TWILIO_ACCOUNT_SID:ACxxx}
twilio.auth.token=${TWILIO_AUTH_TOKEN:authxxx}
twilio.phone.number=${TWILIO_PHONE_NUMBER:+1xxx}
twilio.enabled=${TWILIO_ENABLED:false}

# =====================================
# SPRING AI GOOGLE GEMINI CONFIGURATION
# =====================================
spring.ai.google.genai.chat.options.model=gemini-1.5-flash
spring.ai.google.genai.api-key=${AI_API_KEY}

# =====================================
# RESILIENCE4J CONFIGURATION
# =====================================
resilience4j.ratelimiter.instances.attendance-scan.limit-for-period=1000
resilience4j.ratelimiter.instances.attendance-scan.limit-refresh-period=10s
resilience4j.ratelimiter.instances.attendance-scan.timeout-duration=5s

resilience4j.ratelimiter.instances.attendance-heartbeat.limit-for-period=3000
resilience4j.ratelimiter.instances.attendance-heartbeat.limit-refresh-period=10s
resilience4j.ratelimiter.instances.attendance-heartbeat.timeout-duration=0s

resilience4j.ratelimiter.instances.attendance-heartbeat-enhanced.limit-for-period=3000
resilience4j.ratelimiter.instances.attendance-heartbeat-enhanced.limit-refresh-period=10s
resilience4j.ratelimiter.instances.attendance-heartbeat-enhanced.timeout-duration=0s

# Circuit Breaker Defaults
resilience4j.circuitbreaker.default.wait-duration-in-open-state=30s
resilience4j.circuitbreaker.default.failure-rate-threshold=50
resilience4j.circuitbreaker.default.minimum-number-of-calls=10

# =====================================
# CUSTOM SECURITY THREAT CONFIGURATION
# =====================================
security.threat.detection.enabled=${SECURITY_THREAT_DETECTION_ENABLED:true}
security.threat.detection.suspicious-rate-threshold=${SECURITY_SUSPICIOUS_RATE:2000}
security.threat.detection.rapid-succession-threshold=${SECURITY_RAPID_SUCCESSION:500}
security.jwt.blacklist.enabled=${SECURITY_JWT_BLACKLIST_ENABLED:true}

spring.jackson.deserialization.fail-on-unknown-properties=false