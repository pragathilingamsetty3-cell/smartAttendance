# =====================================
# LOCAL SERVER - ELITE UPGRADE
# OPTIMIZED FOR 8GB+ RAM HARDWARE
# =====================================

server.ssl.enabled=false
server.port=10000
server.address=0.0.0.0

# 🏎️ ELITE PERFORMANCE: High-Concurrency Virtual Threads
# Allows thousands of concurrent users with zero overhead on local hardware
spring.threads.virtual.enabled=true

# Database Configuration (Supercharged for Local PostgreSQL)
spring.datasource.url=jdbc:postgresql://${DB_HOST}:${DB_PORT}/${DB_NAME}?prepareThreshold=0
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# 🚀 Hikari Connection Pool (ULTIMATE MODE)
spring.datasource.hikari.maximum-pool-size=25
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.idle-timeout=60000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.connection-timeout=15000

# 🧠 BRAIN POWER: Expanded Caching (LEAN MODE)
spring.cache.caffeine.spec=maximumSize=1000,expireAfterWrite=30m

# 🏗️ Tomcat Universal Capacity (LEAN MODE)
server.tomcat.max-threads=50
server.tomcat.min-spare-threads=5
server.tomcat.max-connections=1000

# 🛡️ LOCAL SECURITY ENFORCEMENT
# Behavioral analysis is strictly enabled to prevent attendance proxying
behavioral.analysis.enabled=true
behavioral.analysis.strict-mode=true
security.threat.detection.enabled=true

# 📝 ELITE LOGGING: Detailed Audit Trail
# Keeps a local file of all security events for the college admin
logging.file.name=smart-attendance-audit.log
logging.level.root=INFO
logging.level.com.example.smartAttendence=DEBUG
logging.level.org.hibernate.SQL=WARN
logging.pattern.file=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n

# 🏎️ ELITE SPEED: Global Gzip Compression (Enabled)
server.compression.enabled=true
server.compression.mime-types=text/html,text/xml,text/plain,text/css,text/javascript,application/javascript,application/json,application/xml
server.compression.min-response-size=512

# JWT Reliability
jwt.issuer=${JWT_ISSUER:smart-attendance-college-server}
jwt.access-token.expiration-minutes=${JWT_ACCESS_TOKEN_EXPIRATION_MINUTES:120}
jwt.refresh-token.expiration-days=${JWT_REFRESH_TOKEN_EXPIRATION_DAYS:180}

# CORS Allowed Origins (Local profile allows Cloudflare Pages + localhost for development)
security.cors.allowed-origins=https://smartattendance-b44.pages.dev,http://localhost:3000,http://localhost:5173
