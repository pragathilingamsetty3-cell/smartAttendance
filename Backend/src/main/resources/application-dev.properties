# =====================================
# LOCAL DEVELOPMENT PROFILE (DEV)
# =====================================
spring.config.import=optional:file:.env

# Server & SSL (Local HTTPS enabled)
server.port=${PORT:8443}
server.ssl.enabled=${SSL_ENABLED:true}
server.ssl.key-store-password=${SSL_KEYSTORE_PASSWORD:password}

# Database (Local Postgres / Supabase with local defaults)
spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:smart_attendance}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}
spring.jpa.hibernate.ddl-auto=update

# Local Storage (Now using Local Caffeine & Firebase Emulator if available)

# Mail Configuration (GMAIL / Local Testing)
spring.mail.host=${EMAIL_HOST:smtp.gmail.com}
spring.mail.port=${EMAIL_PORT:587}
spring.mail.username=${EMAIL_USERNAME:}
spring.mail.password=${EMAIL_PASSWORD:}
mail.test-on-startup=true

# Firebase (Local Path)
firebase.enabled=${FIREBASE_ENABLED:true}
firebase.service-account-path=${FIREBASE_SERVICE_ACCOUNT_PATH:src/main/resources/firebase/smartattendance-22b94-firebase-adminsdk-fbsvc-a0bf2dff98.json}

# Rate Limiting (Relaxed for Dev)
rate-limit.global.requests-per-minute=${RATE_LIMIT_GLOBAL_RPM:1000}
rate-limit.auth.requests-per-minute=${RATE_LIMIT_AUTH_RPM:100}
rate-limit.admin.requests-per-minute=${RATE_LIMIT_ADMIN_RPM:100}
rate-limit.heartbeat.requests-per-minute=${RATE_LIMIT_HEARTBEAT_RPM:1000}
