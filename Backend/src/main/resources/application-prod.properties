# =====================================
# PRODUCTION PROFILE (PROD / RENDER)
# =====================================

# Server & SSL (Render handles SSL at the load balancer)
server.ssl.enabled=false
server.port=${PORT:10000}

# Database (Supabase / Production Postgres)
spring.datasource.url=jdbc:postgresql://${DB_HOST}:${DB_PORT}/${DB_NAME}?prepareThreshold=0
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false

# Hikari Production Tuning
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.leak-detection-threshold=60000

# Redis (Upstash / Production Redis)
spring.data.redis.host=${REDIS_HOST}
spring.data.redis.port=${REDIS_PORT}
spring.data.redis.password=${REDIS_PASSWORD}
spring.data.redis.ssl.enabled=true

# Mail Configuration (Production SMTP)
spring.mail.host=${EMAIL_HOST}
spring.mail.port=${EMAIL_PORT}
spring.mail.username=${EMAIL_USERNAME}
spring.mail.password=${EMAIL_PASSWORD}
mail.test-on-startup=false

# Firebase (Production Base64)
firebase.enabled=true
# No path needed as we use Base64 in prod
firebase.service-account-path=

# Rate Limiting (Strict for Production)
rate-limit.global.requests-per-minute=${RATE_LIMIT_GLOBAL_RPM:5000}
rate-limit.auth.requests-per-minute=${RATE_LIMIT_AUTH_RPM:60}
rate-limit.admin.requests-per-minute=${RATE_LIMIT_ADMIN_RPM:100}
rate-limit.heartbeat.requests-per-minute=${RATE_LIMIT_HEARTBEAT_RPM:3000}

# JWT Security
jwt.issuer=${JWT_ISSUER}
jwt.public-key=${JWT_PUBLIC_KEY}
jwt.private-key=${JWT_PRIVATE_KEY}
