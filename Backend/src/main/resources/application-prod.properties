# =====================================
# PRODUCTION PROFILE (PROD / RENDER)
# OPTIMIZED FOR 512MB FREE TIER
# =====================================

server.ssl.enabled=false
server.port=${PORT:10000}
server.address=0.0.0.0

spring.datasource.url=jdbc:postgresql://${DB_HOST}:${DB_PORT}/${DB_NAME}?prepareThreshold=0
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false

spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.max-lifetime=1200000
spring.datasource.hikari.leak-detection-threshold=60000
spring.datasource.hikari.initialization-fail-timeout=0
spring.datasource.hikari.validation-timeout=5000
spring.datasource.hikari.connection-timeout=30000

spring.mail.host=${EMAIL_HOST}
spring.mail.port=${EMAIL_PORT}
spring.mail.username=${EMAIL_USERNAME}
spring.mail.password=${EMAIL_PASSWORD}
mail.test-on-startup=false

firebase.enabled=false
firebase.service-account-path=${FIREBASE_SERVICE_ACCOUNT_PATH:}

spring.main.lazy-initialization=true
spring.main.log-startup-info=false
spring.main.banner-mode=off

spring.jpa.properties.hibernate.boot.allow_jdbc_metadata_access=false
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true
spring.jpa.properties.hibernate.jdbc.batch_size=15
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true

server.tomcat.max-threads=10
server.tomcat.min-spare-threads=2
server.tomcat.connection-timeout=30000
server.tomcat.accept-count=100
server.tomcat.max-connections=100

rate-limit.global.requests-per-minute=${RATE_LIMIT_GLOBAL_RPM:2000}
rate-limit.auth.requests-per-minute=${RATE_LIMIT_AUTH_RPM:60}
rate-limit.admin.requests-per-minute=${RATE_LIMIT_ADMIN_RPM:100}
rate-limit.heartbeat.requests-per-minute=${RATE_LIMIT_HEARTBEAT_RPM:1000}

jwt.issuer=${JWT_ISSUER}
jwt.public-key=${JWT_PUBLIC_KEY}
jwt.private-key=${JWT_PRIVATE_KEY}
jwt.access-token.expiration-minutes=${JWT_ACCESS_TOKEN_EXPIRATION_MINUTES}
jwt.refresh-token.expiration-days=${JWT_REFRESH_TOKEN_EXPIRATION_DAYS}

logging.level.root=WARN
logging.level.com.zaxxer.hikari=ERROR
logging.level.org.springframework.web=ERROR
logging.level.org.springframework.security=WARN
logging.level.org.springframework.boot.actuate=ERROR
logging.level.org.apache.catalina=ERROR
logging.level.org.springframework.messaging=ERROR
logging.level.org.springframework.data=ERROR
logging.level.com.example.smartAttendence=INFO
logging.level.org.hibernate=WARN
logging.level.org.postgresql.jdbc=ERROR
logging.level.org.springframework=ERROR

logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%-5level] %logger{0} - %msg%n
logging.pattern.file=%d{yyyy-MM-dd HH:mm:ss} [%-5level] %logger{0} - %msg%n

management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=when-authorized