# =====================================
# PRODUCTION PROFILE (PROD / RENDER)
# =====================================

# Server & SSL (Render handles SSL at the load balancer)
server.ssl.enabled=false
server.port=${PORT:10000}

# Database (Supabase / Production Postgres)
spring.datasource.url=jdbc:postgresql://${DB_HOST}:${DB_PORT}/${DB_NAME}?prepareThreshold=0
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false

# Hikari Production Tuning
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.leak-detection-threshold=60000

# Redis (Upstash / Production Redis)
spring.data.redis.host=${REDIS_HOST}
spring.data.redis.port=${REDIS_PORT}
spring.data.redis.password=${REDIS_PASSWORD}
spring.data.redis.ssl.enabled=true

# Mail Configuration (Production SMTP)
spring.mail.host=${EMAIL_HOST}
spring.mail.port=${EMAIL_PORT}
spring.mail.username=${EMAIL_USERNAME}
spring.mail.password=${EMAIL_PASSWORD}
mail.test-on-startup=false

# Firebase (Production Secret Files via Render)
firebase.enabled=true
firebase.service-account-path=${FIREBASE_SERVICE_ACCOUNT_PATH:}

# Performance Tuning (Optimized for Fast Render Boot)
spring.main.lazy-initialization=true
spring.main.log-startup-info=true

# Hibernate Performance (Metadata Short-circuit)
spring.jpa.properties.hibernate.temp.use_jdbc_metadata_defaults=false
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true

# Hikari Performance (Hardened)
spring.datasource.hikari.initialization-fail-timeout=0
spring.datasource.hikari.validation-timeout=5000
spring.datasource.hikari.connection-timeout=60000

# Tomcat Optimization
server.tomcat.max-threads=30
server.tomcat.min-spare-threads=10
server.tomcat.connection-timeout=60000
server.tomcat.accept-count=200

# Rate Limiting (Strict for Production)
rate-limit.global.requests-per-minute=${RATE_LIMIT_GLOBAL_RPM:5000}
rate-limit.auth.requests-per-minute=${RATE_LIMIT_AUTH_RPM:60}
rate-limit.admin.requests-per-minute=${RATE_LIMIT_ADMIN_RPM:100}
rate-limit.heartbeat.requests-per-minute=${RATE_LIMIT_HEARTBEAT_RPM:3000}

# JWT Security
jwt.issuer=${JWT_ISSUER}
jwt.public-key=${JWT_PUBLIC_KEY}
jwt.private-key=${JWT_PRIVATE_KEY}
