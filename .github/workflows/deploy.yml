name: Build and Deploy to Azure VM

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Build with Maven (Force Refresh)
        working-directory: Backend
        run: |
          chmod +x mvnw
          ./mvnw clean package -DskipTests -U

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: backend-jar
          path: Backend/target/*.jar

  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: backend-jar

      - name: Copy JAR to VM
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VM_IP }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "*.jar"
          target: "/home/azureuser/"

      - name: Restart Backend on VM
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VM_IP }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            export HOME=/home/azureuser
            echo "🛑 NUCLEAR SHUTDOWN: Killing all java processes..."
            sudo systemctl stop smart-attendance.service || true
            sudo pkill -9 java || true
            
            echo "🧹 CLEANING OLD DEPLOYMENTS..."
            rm -rf /home/azureuser/Backend/target/*
            
            echo "🚚 Moving new JAR to production folder..."
            mkdir -p /home/azureuser/Backend/target/
            mv /home/azureuser/smartAttendence-0.0.1-SNAPSHOT.jar /home/azureuser/Backend/target/smartAttendence-0.0.1-SNAPSHOT.jar
            
            echo "🚀 Starting new process (Secure Mode)..."
            sudo systemctl daemon-reload
            
            # Start using existing server environment variables for security
            nohup java -Xmx384m -jar /home/azureuser/Backend/target/smartAttendence-0.0.1-SNAPSHOT.jar \
              --spring.profiles.active=local \
              --server.port=10000 > /home/azureuser/backend.log 2>&1 &
            
            # Final verification
            sleep 15
            ps aux | grep java
