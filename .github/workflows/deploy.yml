name: Build and Deploy to Azure VM

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Build with Maven
        working-directory: Backend
        run: |
          chmod +x mvnw
          ./mvnw clean package -DskipTests

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: backend-jar
          path: Backend/target/*.jar

  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: backend-jar

      - name: Copy JAR to VM
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VM_IP }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "*.jar"
          target: "/home/azureuser/"

      - name: Restart Backend on VM
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VM_IP }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            export HOME=/home/azureuser
            echo "🛑 NUCLEAR SHUTDOWN: Killing all java processes..."
            sudo systemctl stop smart-attendance.service || true
            sudo pkill -9 java || true
            sudo fuser -k 10000/tcp || true
            
            echo "🚚 Updating JAR file..."
            mkdir -p /home/azureuser/Backend/target/
            rm -f /home/azureuser/Backend/target/smartAttendence-0.0.1-SNAPSHOT.jar
            mv /home/azureuser/smartAttendence-0.0.1-SNAPSHOT.jar /home/azureuser/Backend/target/smartAttendence-0.0.1-SNAPSHOT.jar
            
            echo "🚀 Starting new process..."
            sudo systemctl daemon-reload
            sudo systemctl start smart-attendance.service
            
            # Diagnostic check
            sleep 10
            sudo systemctl status smart-attendance.service --no-pager
            ps aux | grep java
