name: Build and Deploy to Azure VM

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Build with Maven
        working-directory: Backend
        run: |
          chmod +x mvnw
          ./mvnw clean package -DskipTests

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: backend-jar
          path: Backend/target/*.jar

  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: backend-jar

      - name: Copy JAR to VM
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VM_IP }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "*.jar"
          target: "/home/azureuser/"

      - name: Restart Backend on VM
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VM_IP }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            export HOME=/home/azureuser
            echo "🛑 NUCLEAR SHUTDOWN: Killing all java processes..."
            sudo systemctl stop smart-attendance.service || true
            sudo pkill -9 java || true
            
            echo "🔍 LOCATING ACTIVE JAR..."
            ACTIVE_JAR=$(find /home/azureuser -name "smartAttendence-0.0.1-SNAPSHOT.jar" | head -n 1)
            echo "Found JAR at: $ACTIVE_JAR"
            
            echo "🚚 Updating JAR file everywhere..."
            # Update the main target
            mkdir -p /home/azureuser/Backend/target/
            cp /home/azureuser/smartAttendence-0.0.1-SNAPSHOT.jar /home/azureuser/Backend/target/smartAttendence-0.0.1-SNAPSHOT.jar
            
            # Update any other location found
            if [ ! -z "$ACTIVE_JAR" ]; then
              cp /home/azureuser/smartAttendence-0.0.1-SNAPSHOT.jar "$ACTIVE_JAR"
            fi
            
            echo "🚀 Starting new process..."
            sudo systemctl daemon-reload
            sudo systemctl start smart-attendance.service || nohup java -Xmx384m -jar /home/azureuser/Backend/target/smartAttendence-0.0.1-SNAPSHOT.jar > /home/azureuser/backend.log 2>&1 &
            
            # Final verification
            sleep 10
            ps aux | grep java
